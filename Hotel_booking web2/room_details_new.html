<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --accent: #ec4899;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
            overflow-x: hidden;
        }

        .room-details-wrapper {
            min-height: 100vh;
            padding: 20px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .room-hero-section {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            margin-bottom: 40px;
            position: relative;
        }

        .image-gallery-container {
            position: relative;
            height: 600px;
            background: linear-gradient(45deg, #f3f4f6, #e5e7eb);
            overflow: hidden;
        }

        .image-quality-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(238, 75, 43, 0.3);
            z-index: 10;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            filter: brightness(1.05) contrast(1.1);
            transform: scale(1.02);
            border: none;
            border-radius: 0;
        }

        .image-navigation {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .nav-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }

        .image-indicators {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #cbd5e1;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: var(--primary);
            width: 30px;
            border-radius: 5px;
        }

        .room-content-section {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            margin-bottom: 40px;
        }

        .room-main-info {
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .room-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .room-price-tag {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .price-currency {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .price-period {
            font-size: 1rem;
            opacity: 0.8;
        }

        .room-specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .spec-card {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .spec-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.2);
        }

        .spec-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .spec-label {
            font-size: 0.875rem;
            color: var(--gray);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .spec-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark);
        }

        .description-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        .description-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--gray);
            background: #f8fafc;
            padding: 30px;
            border-radius: 20px;
            border-left: 4px solid var(--primary);
        }

        .amenities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .amenity-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid #f1f5f9;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .amenity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .amenity-card:hover::before {
            left: 100%;
        }

        .amenity-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15);
        }

        .amenity-icon {
            font-size: 1.5rem;
            color: var(--primary);
            min-width: 30px;
        }

        .amenity-name {
            font-weight: 600;
            color: var(--dark);
        }

        .booking-section {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .booking-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        .booking-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
        }

        .form-input {
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .book-now-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 18px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .book-now-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .book-now-btn:hover::before {
            left: 100%;
        }

        .book-now-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
        }

        .features-highlight {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 4px solid var(--warning);
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .feature-icon {
            color: var(--warning);
        }

        @media (max-width: 1200px) {
            .room-content-section {
                grid-template-columns: 1fr;
            }

            .booking-section {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .room-details-wrapper {
                padding: 10px;
            }

            .room-title {
                font-size: 2rem;
            }

            .room-main-info {
                padding: 25px;
            }

            .booking-section {
                padding: 25px;
            }

            .image-gallery-container {
                height: 400px;
            }

            .room-specs-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .amenities-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Smooth transitions */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    <div class="room-details-wrapper">
        <a href="standard_room.html" id="backButton" class="back-button">
            <i class="fas fa-arrow-left"></i>
            Back to Rooms
        </a>

        <div class="room-hero-section">
            <div class="image-gallery-container">
                <div class="image-quality-badge">4K HD</div>
                <img id="mainImage" class="main-image" src="" alt="Room Image">
                <div class="image-navigation">
                    <button class="nav-btn" id="prevBtn">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="image-indicators" id="indicators">
                        <!-- Indicators will be populated by JavaScript -->
                    </div>
                    <button class="nav-btn" id="nextBtn">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="room-content-section">
            <div class="room-main-info">
                <h1 id="roomName" class="room-title">Room Name</h1>
                
                <div class="room-price-tag">
                    <span class="price-currency">Rs.</span>
                    <span id="roomPrice">0</span>
                    <span class="price-period">/ night</span>
                </div>

                <div class="room-specs-grid">
                    <div class="spec-card">
                        <span class="spec-icon">🛏️</span>
                        <div class="spec-label">Bed Type</div>
                        <div class="spec-value" id="bedType">-</div>
                    </div>
                    <div class="spec-card">
                        <span class="spec-icon">👥</span>
                        <div class="spec-label">Capacity</div>
                        <div class="spec-value" id="capacity">-</div>
                    </div>
                    <div class="spec-card">
                        <span class="spec-icon">📏</span>
                        <div class="spec-label">Room Size</div>
                        <div class="spec-value" id="roomSize">-</div>
                    </div>
                    <div class="spec-card">
                        <span class="spec-icon">🌟</span>
                        <div class="spec-label">Room Type</div>
                        <div class="spec-value" id="roomType">Standard</div>
                    </div>
                </div>

                <div class="features-highlight">
                    <div class="feature-item">
                        <i class="fas fa-check-circle feature-icon"></i>
                        <span>Free WiFi throughout the property</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle feature-icon"></i>
                        <span>24/7 Room service available</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle feature-icon"></i>
                        <span>Daily housekeeping included</span>
                    </div>
                </div>

                <div class="description-section">
                    <h2 class="section-title">About This Room</h2>
                    <p id="roomDescription" class="description-text">Room description will appear here.</p>
                </div>

                <div class="amenities-section">
                    <h2 class="section-title">Amenities & Features</h2>
                    <div class="amenities-grid" id="amenitiesGrid">
                        <!-- Amenities will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <div class="booking-section">
                <h3 class="booking-header">Book Your Stay</h3>
                <form class="booking-form" id="bookingForm">
                    <div class="form-group">
                        <label class="form-label" for="checkIn">Check-in Date</label>
                        <input type="date" id="checkIn" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="checkOut">Check-out Date</label>
                        <input type="date" id="checkOut" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="guests">Number of Guests</label>
                        <input type="number" id="guests" class="form-input" min="1" value="2" required>
                    </div>
                    <button type="submit" class="book-now-btn">
                        <span id="btnText">Book Now</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

        let currentImageIndex = 0;
        let currentRoom = null;

        // Get room ID from URL parameter
        function getRoomId() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('room');
            console.log('Room ID from URL:', roomId); // Debug log
            console.log('Available rooms:', Object.keys(roomData)); // Debug log
            return roomId;
        }

        // Initialize page
        function initializePage() {
            const roomId = getRoomId();
            currentRoom = roomData[roomId];
            
            if (!currentRoom) {
                document.querySelector('.room-details-wrapper').innerHTML = `
                    <div style="text-align: center; padding: 100px 20px; color: white;">
                        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px;">
                            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">🏨 Room Not Found</h1>
                            <p style="font-size: 1.2rem; margin-bottom: 30px;">The room you're looking for doesn't exist.</p>
                            <a href="standard_room.html" class="back-button" style="display: inline-flex;">
                                <i class="fas fa-arrow-left"></i>
                                Back to Rooms
                            </a>
                        </div>
                    </div>
                `;
                return;
            }

            populateRoomInfo();
            setupImageGallery();
            setupAmenities();
            setupBookingForm();
            addAnimations();
        }

        // Populate room information
        function populateRoomInfo() {
            document.getElementById('roomName').textContent = currentRoom.name;
            document.getElementById('roomPrice').textContent = currentRoom.price;
            document.getElementById('bedType').textContent = currentRoom.bedType;
            document.getElementById('capacity').textContent = currentRoom.capacity;
            document.getElementById('roomSize').textContent = currentRoom.size;
            document.getElementById('roomType').textContent = currentRoom.type;
            document.getElementById('roomDescription').textContent = currentRoom.description;
            
            // Update back button based on room type
            const backButton = document.getElementById('backButton');
            if (currentRoom.type === 'Deluxe') {
                backButton.href = 'delux_room.html';
            } else if (currentRoom.type === 'Suite') {
                backButton.href = 'executive_suite_rooms.html'; // Executive suites page
            } else {
                backButton.href = 'standard_room.html';
            }
        }

        // Setup image gallery
        function setupImageGallery() {
            const mainImage = document.getElementById('mainImage');
            const indicatorsContainer = document.getElementById('indicators');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            // Set initial image
            mainImage.src = currentRoom.images[0];
            
            // Create indicators
            currentRoom.images.forEach((_, index) => {
                const indicator = document.createElement('div');
                indicator.className = `indicator ${index === 0 ? 'active' : ''}`;
                indicator.addEventListener('click', () => showImage(index));
                indicatorsContainer.appendChild(indicator);
            });
            
            // Navigation buttons
            prevBtn.addEventListener('click', showPreviousImage);
            nextBtn.addEventListener('click', showNextImage);
            
            // Auto-play gallery
            setInterval(showNextImage, 5000);
        }

        function showImage(index) {
            currentImageIndex = index;
            const mainImage = document.getElementById('mainImage');
            const indicators = document.querySelectorAll('.indicator');
            
            // Add loading effect
            mainImage.style.opacity = '0.5';
            mainImage.style.filter = 'blur(5px)';
            
            setTimeout(() => {
                mainImage.src = currentRoom.images[index];
                mainImage.style.opacity = '1';
                mainImage.style.filter = 'brightness(1.05) contrast(1.1)';
            }, 300);
            
            indicators.forEach((indicator, i) => {
                indicator.classList.toggle('active', i === index);
            });
        }

        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % currentRoom.images.length;
            showImage(currentImageIndex);
        }

        function showPreviousImage() {
            currentImageIndex = (currentImageIndex - 1 + currentRoom.images.length) % currentRoom.images.length;
            showImage(currentImageIndex);
        }

        // Setup amenities
        function setupAmenities() {
            const amenitiesGrid = document.getElementById('amenitiesGrid');
            
            currentRoom.amenities.forEach(amenity => {
                const amenityCard = document.createElement('div');
                amenityCard.className = 'amenity-card fade-in';
                amenityCard.innerHTML = `
                    <i class="${amenity.icon} amenity-icon"></i>
                    <span class="amenity-name">${amenity.name}</span>
                `;
                amenitiesGrid.appendChild(amenityCard);
            });
        }

        // Setup booking form
        function setupBookingForm() {
            const form = document.getElementById('bookingForm');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const bookingData = {
                    roomName: currentRoom.name,
                    roomPrice: currentRoom.price,
                    checkIn: document.getElementById('checkIn').value,
                    checkOut: document.getElementById('checkOut').value,
                    guests: document.getElementById('guests').value
                };
                
                // Show loading state
                const btnText = document.getElementById('btnText');
                const originalText = btnText.textContent;
                btnText.innerHTML = '<span class="loading"></span> Processing...';
                
                // Store booking data and redirect
                localStorage.setItem('bookingData', JSON.stringify(bookingData));
                
                setTimeout(() => {
                    window.location.href = 'booknow.html';
                }, 1500);
            });
        }

        // Add animations
        function addAnimations() {
            // Animate elements on scroll
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('fade-in');
                    }
                });
            });
            
            document.querySelectorAll('.spec-card, .amenity-card').forEach(el => {
                observer.observe(el);
            });
        }

        // Initialize page when DOM is loaded
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
